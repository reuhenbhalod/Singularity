# SwiftLint configuration for Singularity
# Docs: https://github.com/realm/SwiftLint
# Run from this directory: `swiftlint`

included:
  - Singularity
  - SingularityTests
  - SingularityUITests

excluded:
  - Singularity.xcodeproj
  - build
  - DerivedData

disabled_rules:
  - todo                # in-progress build; TODOs are allowed during development
  - trailing_whitespace # swift-format owns whitespace formatting
  - trailing_comma      # swift-format wants trailing commas in multiline collection literals

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  # NB: `sorted_imports` removed — import ordering is owned by
  # `swift-format` (case-sensitive ASCII sort). swiftlint's
  # `sorted_imports` is case-insensitive and disagrees on the
  # placement of lowercase modules like `os`.

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  excluded:
    - id
    - to
    - up
